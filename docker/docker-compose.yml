version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_media_postgres
    environment:
      POSTGRES_USER: ai_media_user
      POSTGRES_PASSWORD: ai_media_secure_password_2026
      POSTGRES_DB: ai_media_db
    ports:
      - "5433:5432" # Mengubah port luar ke 5433 agar tidak bentrok dengan proyek lain Anda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
    driver: local